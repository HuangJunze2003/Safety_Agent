### LLaMA-Factory LoRA config for Qwen 3.0-VL (local model path)

stage: sft
do_train: true
finetuning_type: lora
lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05

model_name_or_path: ./models/base-vl
template: qwen2_vl

### dataset
dataset_dir: data/data_processed
dataset: safety_qwen3vl_sft_cleaned_image
max_samples: 100000
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 8

### output
output_dir: outputs/qwen3vl_lora_local
logging_steps: 10
save_steps: 50
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 0.00005
num_train_epochs: 4.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
gradient_checkpointing: true

### eval
val_size: 0.1
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 50

### multimodal
freeze_vision_tower: false
