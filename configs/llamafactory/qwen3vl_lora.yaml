### LLaMA-Factory LoRA config for Qwen 3.0-VL

stage: sft
do_train: true
finetuning_type: lora
lora_target: all-linear
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05

model_name_or_path: Qwen/Qwen3.0-VL-8B-Instruct
template: qwen2_vl

### dataset
dataset_dir: data/data_processed
dataset: safety_qwen3vl_sft
max_samples: 100000
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 8

### output
output_dir: outputs/qwen3vl_lora
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5e-5
num_train_epochs: 4.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
gradient_checkpointing: true

### eval
val_size: 0.05
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 200

### multimodal
freeze_vision_tower: false
freeze_multi_modal_projector: false
